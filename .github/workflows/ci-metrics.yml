name: CI Metrics Experiment

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run static analysis
        run: ruff check .

  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        id: pytest
        continue-on-error: true
        run: |
          mkdir -p reports data/current
          pytest --junitxml=reports/junit.xml

      - name: Extract test metrics
        if: always()
        run: python scripts/extract_test_metrics.py reports/junit.xml data/current/test_metrics.json

      - name: Upload pipeline metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-metrics-${{ github.run_id }}
          path: |
            reports/junit.xml
            data/current/test_metrics.json
            experiment_config.json

      - name: Fail job when tests fail
        if: steps.pytest.outcome == 'failure'
        run: exit 1

